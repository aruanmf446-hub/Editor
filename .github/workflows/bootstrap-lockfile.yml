name: Bootstrap lockfile

on:
  push:
    branches: [phase3/fluid-animation-runtime]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: phase3/fluid-animation-runtime

      - name: Skip when lockfile already exists
        id: lockfile
        shell: bash
        run: |
          if git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.lockfile.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate package-lock.json
        if: steps.lockfile.outputs.exists == 'false'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit package-lock.json
        if: steps.lockfile.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: add npm lockfile"
          git push origin HEAD:phase3/fluid-animation-runtime
